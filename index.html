<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Srinivas Kasiriveni | LinkedIn Certifications & Web Development Skills</title>

  <meta name="description" content="Portfolio of LinkedIn Learning certifications completed by Srinivas Kasiriveni, showcasing skills in JavaScript, React, CSS, Node.js, UX, accessibility, and modern web development." />
  <meta name="keywords" content="Srinivas Kasiriveni, LinkedIn certifications, JavaScript, React, CSS, Node.js, frontend developer, web development, UX, accessibility" />
  <meta name="author" content="Srinivas Kasiriveni" />
  <meta name="robots" content="index,follow" />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Srinivas Kasiriveni | LinkedIn Certifications & Web Development Skills" />
  <meta property="og:description" content="Browse a curated gallery of Srinivas Kasiriveni's LinkedIn Learning certifications across JavaScript, React, CSS, Node.js, UX, and more." />
  <meta property="og:image" content="/og-image.png" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Srinivas Kasiriveni | LinkedIn Certifications" />
  <meta name="twitter:description" content="Showcasing LinkedIn Learning certifications in modern web development, JavaScript, React, UX, and more." />

  <link rel="stylesheet" href="./styles.css" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Srinivas Kasiriveni",
      "url": "https://www.linkedin.com/in/kasiriveni",
      "sameAs": [
        "https://github.com/kasiriveni",
        "https://www.linkedin.com/in/kasiriveni"
      ],
      "hasOccupation": {
        "@type": "Occupation",
        "name": "Web Developer",
        "description": "Frontend / JavaScript engineer with LinkedIn Learning certifications in React, CSS, Node.js, UX and modern web tooling."
      }
    }
  </script>
</head>
<body>
  <div class="page">
    <header class="hero">
      <div class="hero-inner">
        <h1 class="hero-title">✨ Srinivas Kasiriveni LinkedIn Certifications</h1>
        <p class="hero-subtitle">🚀 A curated collection of my learning journey across web development, JavaScript, React, UX, and more.</p>
      </div>
    </header>

    <main class="content" id="app">
      <section class="controls" aria-label="Certification filters and search">
        <div class="controls-left">
          <label class="field">
            <span class="field-label">Search</span>
            <div class="field-input-wrap">
              <input id="searchInput" type="search" placeholder="🔍 Search by title, topic, or keyword" autocomplete="off" />
            </div>
          </label>
        </div>
        <div class="controls-right">
          <div class="field">
            <span class="field-label">Category</span>
            <div class="chip-group" id="categoryChips" role="radiogroup" aria-label="Filter by category">
              <!-- Chips injected by JS -->
            </div>
          </div>
        </div>
      </section>

      <section class="summary" aria-live="polite">
        <span id="resultCount">Loading certifications…</span>
      </section>

      <section class="grid" id="certGrid" aria-label="Certification list">
        <!-- Cards injected by JS -->
      </section>
    </main>

    <footer class="footer">
      <p class="footer-text">© <span id="footerYear"></span> Srinivas Kasiriveni · Built with ❤️ + 💻 to showcase continuous learning.</p>
      <div class="footer-social" aria-label="Social profiles">
        <span class="footer-social-label">Connect</span>
        <a
          href="https://github.com/kasiriveni"
          class="footer-icon-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub profile"

            />
          </svg>
        </a>
        <a
          href="https://www.linkedin.com/in/kasiriveni"
          class="footer-icon-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn profile"
        >
          <svg class="footer-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"

      </div>
    </footer>
  </div>

  <script src="./app.js"></script>
</body>
</html>
